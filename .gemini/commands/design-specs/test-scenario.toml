description = "Creates common language test scenario for issue <issue_number>"

prompt = """
Analyze the requirements and design for issue `{{args}}` and create a test scenario file in common language.

### 1. Research & Instrumentation
- Explore the Composable UI code in `app/src/main/java/com/example/underpressure/ui/` to identify key elements.
- Use `Modifier.testTag()` if needed to identify elements that aren't easily selectable by text.
- Ensure all elements required for the scenario can be located via text, content description, or tag.

### 2. Scenario Creation
- **Inputs**: 
    - Requirements: `.design-specs/specs/requirements-{{args}}.md`
    - Design: `.design-specs/specs/design-{{args}}.md`
    - Template: `.design-specs/templates/test-scenario-template.md`
- **Output**: Create a new test scenario file `app/src/androidTest/scenarios/issue-{{args}}-scenario.md`.
- **Content**: 
    - Describe the test steps and expected outcomes in common language.
    - Use the exact structure from the template.
    - Reference specific UI elements (by text, description, or tag) for all interactions mentioned in the steps.
    - If a `testTag` doesn't exist yet, propose adding it to the relevant Composable before finalizing the scenario.

### Use .design-specs/testing.md for technical context on tests.
"""
