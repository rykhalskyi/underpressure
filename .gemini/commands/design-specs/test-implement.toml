description = "Automate Android Compose test creation from a scenario file"

prompt = """
Analyze the test scenario from `{{args}}` and implement a corresponding Android Compose UI test.

### 1. Research & Instrumentation
- Locate relevant Composable functions for the feature in `app/src/main/java/com/example/underpressure/ui/`.
- If needed, add `Modifier.testTag("tag_name")` to UI elements to make them easily selectable.
- Prefer selecting elements by `stringResource` (text or content description) when possible to ensure localization is also tested.

### 2. Test Implementation
- Create a new Compose UI test in `app/src/androidTest/java/com/example/underpressure/ui/`.
- Use `createComposeRule()` or `createAndroidComposeRule<MainActivity>()`.
- Use `onNodeWithTag()`, `onNodeWithText()`, or `onNodeWithContentDescription()` for interactions.
- Ensure all visibility and text assertions from the scenario are covered.
- Mock ViewModels and Repositories as needed using MockK.

### Use .design-specs/testing.md for technical context on tests.
"""

